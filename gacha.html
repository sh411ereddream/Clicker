      for (let t = target; t <= 4; t++) { pool = banner.characters.filter(c => c.rarity === t); if (pool.length) break; }

        const effectiveRarity = getCharEffectiveRarity(c.id);
        const isFav = favorites[c.id];
        return `<div class="collection-item" style="opacity:${owned?1:0.3};cursor:${owned?'pointer':'default'};" data-id="${c.id}"><div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;"><div class="collection-img-wrapper"><img src="${getCharImage(c, lv)}" class="collection-img" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2290%22><rect fill=%22%23444%22 width=%2260%22 height=%2290%22/></svg>'">${border?`<div class="collection-img-border ${border}"></div>`:''}</div><div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;"><span style="word-break:break-word;">${c.name} <span class="rarity-badge">${RARITY_NAMES[effectiveRarity]}</span><span class="favorite-star ${isFav?'active':''}" data-fid="${c.id}">${isFav?'⭐':'☆'}</span></span><span style="font-size:0.75rem;color:#ccc;">${c.tags ? c.tags.map(t => `<span class="tag-badge">${t}</span>`).join(' ') : ''} Ур.${lv} (${cnt}/${need||'-'})</span></div></div><div class="collection-stats-row"><span style="font-size:0.8rem;">🔨+${bonus.toFixed(1)}</span><span style="font-size:0.8rem;">⏳+${pBonus.toFixed(1)}</span>${canUp ? `<button class="upgradeChar" data-id="${c.id}">⬆️ Улучшить (${cost}🌟)</button>` : (lv>=maxLvl&&owned?'✅ Макс.':'')}</div></div>`;
      }).join('');
      document.querySelectorAll('.collection-item[data-id]').forEach(el => el.addEventListener('click', function(e) { if (e.target.tagName === 'BUTTON' || e.target.classList.contains('favorite-star')) return; showCardViewer(parseInt(this.dataset.id)); }));
      document.querySelectorAll('.favorite-star').forEach(star => {
        star.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(star.dataset.fid); favorites[id] = !favorites[id]; saveGame(); renderCollection(); });
      });
      document.querySelectorAll('.upgradeChar').forEach(b => b.onclick = (e) => { e.stopPropagation(); const id = parseInt(b.dataset.id); const cost = UPGRADE_COST[RARITY_NAMES[getCharById(id).rarity]] || 5000; const lv = getCharLevel(id); const cnt = getCharUpgradeCount(id); const need = getUpgradeCountNeeded(id, lv+1); if (cnt < need) { alert(`Недостаточно дубликатов! Нужно ${need}, есть ${cnt}`); return; } if (spendPoints(cost)) { characterLevels[id] = lv + 1; characterUpgradeCounts[id] = cnt - need; updateUI(); saveGame(); } });
    }

    function setupFilters() {
      const rd = document.getElementById('rarityFilterGroup');
      rd.innerHTML = '<button class="filter-btn active" data-rarity="all">Все</button>' + Object.entries(RARITY_NAMES).map(([k,v]) => `<button class="filter-btn" data-rarity="${k}">${v}</button>`).join('') + '<button class="filter-btn" id="favFilterBtn">⭐ Избранное</button>';
      rd.querySelectorAll('.filter-btn').forEach(b => b.onclick = function() {
        if (this.id === 'favFilterBtn') { this.classList.toggle('active'); } else { rd.querySelectorAll('.filter-btn').forEach(x => { if (x.id !== 'favFilterBtn') x.classList.remove('active'); }); this.classList.add('active'); document.getElementById('favFilterBtn').classList.remove('active'); }
        renderCollection();
      });
      document.getElementById('bannerSelector').innerHTML = Object.entries(banners).map(([k,v]) => `<button class="bannerSelBtn" data-banner="${k}">${v.name}</button>`).join(' ');
      document.querySelectorAll('.bannerSelBtn').forEach(b => b.onclick = function() { currentBannerFilter = this.dataset.banner; updateUI(); });
    }

    function switchTab(tab) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(tab+'Screen').classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active'); if (tab === 'collection') updateUI(); }
    function restartPassiveInterval() { if (passiveInterval) clearInterval(passiveInterval); passiveInterval = setInterval(() => { if (calculatePassivePerSecond() > 0) { playerPoints += calculatePassivePerSecond(); updateUI(); } }, 1000); }

    // Preload images
    async function preloadAllImages() {
      const usedPaths = new Set();
      allCharacters.forEach(c => {
        usedPaths.add(c.img);
        if (c.imgLvl2) usedPaths.add(c.imgLvl2);
        if (c.imgLvl3) usedPaths.add(c.imgLvl3);
        for (let i = 4; i <= 9; i++) { if (c[`imgLvl${i}`]) usedPaths.add(c[`imgLvl${i}`]); }
      });
      const allPaths = [...usedPaths];
      const total = allPaths.length;
      let loaded = 0;
      const fill = document.getElementById('loadingFill');
      const text = document.getElementById('loadingText');
      for (const path of allPaths) {
        await new Promise(resolve => {
          const img = new Image();
          img.onload = () => { loaded++; fill.style.width = `${(loaded/total)*100}%`; text.innerText = `Загрузка: ${loaded}/${total}`; resolve(); };
          img.onerror = () => { loaded++; fill.style.width = `${(loaded/total)*100}%`; resolve(); };
          img.src = path;
        });
      }
      document.getElementById('loadingScreen').style.display = 'none';
      document.querySelector('.game-container').style.display = '';
    }

    document.getElementById('clickAreaFull').addEventListener('click', handleClick);
    document.getElementById('toggleUIBtn').addEventListener('click', () => { document.getElementById('deckPanel').classList.toggle('hidden'); document.getElementById('topBar').classList.toggle('hidden'); });
    document.getElementById('settingsTopBtn').addEventListener('click', showSettings);
    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
    window.addEventListener('beforeunload', () => saveGame());

    async function init() {
      await preloadAllImages();
      initState();
      loadGame();
      setupFilters();
      updateUI();
      restartPassiveInterval();
      startBackgroundRotation();
      setInterval(() => saveGame(), 120000);
      document.getElementById('homeScreen').classList.add('active');
    }
    init();
  })();
</script>
</body>
</html>
